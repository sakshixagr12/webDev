<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Doraemon CSS</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#eaf6ff;
}

/* MAIN BODY WRAPPER */
.doraemon{
  position:relative;
  width:300px;
  height:420px;
}

/* HEAD */
.head{
  position:absolute;
  width:260px;
  height:260px;
  background:#00a2e8;
  border-radius:50%;
  border:3px solid #000;
  left:50%;
  transform:translateX(-50%);
}

/* FACE */
.face{
  position:absolute;
  width:190px;
  height:150px;
  background:white;
  border-radius:50%;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  border:3px solid #000;
}

/* EYES */
.eye{
  position:absolute;
  width:45px;
  height:55px;
  background:white;
  border:3px solid #000;
  border-radius:50%;
  top:55px;
}

.eye.left{ left:70px; }
.eye.right{ right:70px; }

.pupil{
  width:10px;
  height:15px;
  background:#000;
  border-radius:50%;
  position:absolute;
  top:25px;
  left:18px;
}

/* NOSE */
.nose{
  position:absolute;
  width:20px;
  height:20px;
  background:red;
  border-radius:50%;
  border:2px solid #000;
  top:110px;
  left:50%;
  transform:translateX(-50%);
}

/* MOUTH */
.mouth{
  position:absolute;
  width:120px;
  height:60px;
  border-bottom:3px solid #000;
  border-radius:0 0 60px 60px;
  top:135px;
  left:50%;
  transform:translateX(-50%);
}

/* WHISKERS */
.whisker{
  position:absolute;
  width:60px;
  height:2px;
  background:#000;
  top:125px;
}

.w1{ left:15px; transform:rotate(10deg); }
.w2{ left:15px; top:140px; }
.w3{ left:15px; top:155px; transform:rotate(-10deg); }

.w4{ right:15px; transform:rotate(-10deg); }
.w5{ right:15px; top:140px; }
.w6{ right:15px; top:155px; transform:rotate(10deg); }

/* BODY */
.body{
  position:absolute;
  width:240px;
  height:220px;
  background:#00a2e8;
  border-radius:50%;
  border:3px solid #000;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
}

/* BELLY */
.belly{
  position:absolute;
  width:170px;
  height:150px;
  background:white;
  border-radius:50%;
  border:3px solid #000;
  top:25px;
  left:50%;
  transform:translateX(-50%);
}

/* POCKET */
.pocket{
  position:absolute;
  width:90px;
  height:60px;
  border:3px solid #000;
  border-bottom-left-radius:50px;
  border-bottom-right-radius:50px;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  background:transparent;
}

/* ARMS */
.arm{
  position:absolute;
  width:80px;
  height:40px;
  background:#00a2e8;
  border:3px solid #000;
  top:170px;
}

.arm.left{
  left:-40px;
  border-radius:40px;
  transform:rotate(20deg);
}

.arm.right{
  right:-40px;
  border-radius:40px;
  transform:rotate(-20deg);
}

/* HANDS */
.hand{
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border:3px solid #000;
  border-radius:50%;
  bottom:-15px;
}

.hand.left{ left:-20px; }
.hand.right{ right:-20px; }

/* BELL */
.bell{
  position:absolute;
  width:40px;
  height:40px;
  background:#f7d117;
  border:3px solid #000;
  border-radius:50%;
  top:230px;
  left:50%;
  transform:translateX(-50%);
}

.bell-line{
  position:absolute;
  width:100%;
  height:2px;
  background:#000;
  top:10px;
}
</style>
</head>

<body>

<div class="doraemon">

  <!-- HEAD -->
  <div class="head">
    <div class="face"></div>

    <div class="eye left"><div class="pupil"></div></div>
    <div class="eye right"><div class="pupil"></div></div>

    <div class="nose"></div>
    <div class="mouth"></div>

    <div class="whisker w1"></div>
    <div class="whisker w2"></div>
    <div class="whisker w3"></div>
    <div class="whisker w4"></div>
    <div class="whisker w5"></div>
    <div class="whisker w6"></div>
  </div>

  <!-- BODY -->
  <div class="body">
    <div class="belly"></div>
    <div class="pocket"></div>

    <div class="arm left"><div class="hand left"></div></div>
    <div class="arm right"><div class="hand right"></div></div>

    <div class="bell">
      <div class="bell-line"></div>
    </div>
  </div>

</div>

</body>
</html>
