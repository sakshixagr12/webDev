<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doraemon Cinematic Scene</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(-45deg,#0b1d3a,#1c2b4a,#0f2a4d,#081427);
  background-size:400% 400%;
  animation:bgShift 10s ease-in-out infinite;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BACKGROUND SHIFT */
@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* STARS */
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite ease-in-out;
  opacity:0.6;
}

@keyframes twinkle{
  0%,100%{opacity:0.2; transform:scale(1);}
  50%{opacity:1; transform:scale(1.8);}
}

/* CLOUDS */
.cloud{
  position:absolute;
  width:140px;
  height:70px;
  background:rgba(255,255,255,0.7);
  border-radius:50px;
  filter:blur(0.5px);
  animation:floatCloud 20s linear infinite;
}

.cloud::before,
.cloud::after{
  content:"";
  position:absolute;
  background:rgba(255,255,255,0.7);
  border-radius:50%;
}

.cloud::before{width:70px;height:70px;top:-25px;left:20px;}
.cloud::after{width:80px;height:80px;top:-30px;right:20px;}

@keyframes floatCloud{
  from{transform:translateX(-300px);}
  to{transform:translateX(1400px);}
}

/* MOON */
.moon{
  position:absolute;
  top:80px;
  right:120px;
  width:100px;
  height:100px;
  background:#fff8c6;
  border-radius:50%;
  box-shadow:0 0 60px rgba(255,255,200,0.6);
}

/* DORAEMON */
.doraemon{
  position:relative;
  width:180px;
  height:240px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* BODY */
.body{
  position:absolute;
  bottom:0;
  width:180px;
  height:180px;
  background:#00a2e8;
  border-radius:50%;
  border:3px solid #000;
}

/* BELLY */
.belly{
  position:absolute;
  width:120px;
  height:110px;
  background:white;
  border-radius:50%;
  left:50%;
  top:30px;
  transform:translateX(-50%);
  border:3px solid #000;
}

/* FACE */
.face{
  position:absolute;
  width:90px;
  height:70px;
  background:white;
  border-radius:50%;
  left:50%;
  top:15px;
  transform:translateX(-50%);
  border:3px solid #000;
}

/* EYES */
.eye{
  position:absolute;
  width:8px;
  height:10px;
  background:#000;
  border-radius:50%;
  top:25px;
  animation:blink 4s infinite;
}

.eye.left{left:30px;}
.eye.right{right:30px;}

@keyframes blink{
  0%,96%,100%{transform:scaleY(1);}
  97%,99%{transform:scaleY(0.1);}
}

/* ARM SWING */
.arm{
  position:absolute;
  width:50px;
  height:30px;
  background:#00a2e8;
  border:3px solid #000;
  top:120px;
  border-radius:30px;
  animation:swing 2s ease-in-out infinite;
}

.arm.left{left:-30px;}
.arm.right{right:-30px;}

@keyframes swing{
  0%,100%{transform:rotate(20deg);}
  50%{transform:rotate(-20deg);}
}

/* SIMPLE GROUND GLOW */
.ground{
  position:absolute;
  bottom:-50px;
  width:100%;
  height:150px;
  background:radial-gradient(circle,#2e7d32,#1b5e20);
  filter:blur(2px);
  opacity:0.8;
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="ground"></div>

<!-- CLOUDS -->
<div class="cloud" style="top:80px;left:-200px;"></div>
<div class="cloud" style="top:180px;left:-400px;"></div>

<!-- DORAEMON -->
<div class="doraemon">
  <div class="body">
    <div class="belly"></div>

    <div class="face">
      <div class="eye left"></div>
      <div class="eye right"></div>
    </div>

    <div class="arm left"></div>
    <div class="arm right"></div>
  </div>
</div>

<!-- STARS -->
<script>
for(let i=0;i<40;i++){
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*window.innerHeight + "px";
  s.style.left = Math.random()*window.innerWidth + "px";
  s.style.animationDuration = (1+Math.random()*3)+"s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
