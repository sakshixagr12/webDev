<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doraemon Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#6ec6ff,#eaf6ff);
  font-family:Arial;
}

/* SCORE */
#score{
  position:absolute;
  top:15px;
  left:15px;
  font-size:20px;
  font-weight:bold;
}

/* GROUND */
.ground{
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:#4caf50;
}

/* DORAEMON */
.doraemon{
  position:absolute;
  bottom:120px;
  left:50px;
  width:120px;
  height:160px;
  transition:0.1s;
}

/* BODY SIMPLE VERSION */
.body{
  width:120px;
  height:120px;
  background:#00a2e8;
  border-radius:50%;
  position:absolute;
  bottom:0;
  border:2px solid #000;
}

.face{
  width:90px;
  height:70px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  border:2px solid #000;
}

/* EYES */
.eye{
  width:10px;
  height:14px;
  background:#000;
  position:absolute;
  border-radius:50%;
  top:20px;
}

.eye.left{ left:35px; }
.eye.right{ right:35px; }

/* DORAYAKI */
.dorayaki{
  position:absolute;
  width:30px;
  height:30px;
  background:#d2691e;
  border-radius:50%;
  border:2px solid #000;
  top:0;
  animation:fall 4s linear forwards;
}

@keyframes fall{
  from{ top:0; }
  to{ top:85vh; }
}
</style>
</head>

<body>

<div id="score">Score: 0</div>
<div class="ground"></div>

<div class="doraemon" id="doraemon">
  <div class="body">
    <div class="face">
      <div class="eye left"></div>
      <div class="eye right"></div>
    </div>
  </div>
</div>

<script>
let doraemon = document.getElementById("doraemon");
let scoreBoard = document.getElementById("score");
let score = 0;
let x = 50;

/* MOVE DORAEMON */
document.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight"){
    x += 20;
  }
  if(e.key === "ArrowLeft"){
    x -= 20;
  }
  doraemon.style.left = x + "px";
});

/* CREATE DORAYAKI */
function spawnDorayaki(){
  let d = document.createElement("div");
  d.classList.add("dorayaki");

  let posX = Math.random() * window.innerWidth;
  d.style.left = posX + "px";

  document.body.appendChild(d);

  let fall = setInterval(()=>{
    let dRect = d.getBoundingClientRect();
    let heroRect = doraemon.getBoundingClientRect();

    /* COLLISION */
    if(
      dRect.left < heroRect.right &&
      dRect.right > heroRect.left &&
      dRect.top < heroRect.bottom &&
      dRect.bottom > heroRect.top
    ){
      score++;
      scoreBoard.innerText = "Score: " + score;
      d.remove();
      clearInterval(fall);
    }

    if(dRect.top > window.innerHeight){
      d.remove();
      clearInterval(fall);
    }
  },50);
}

setInterval(spawnDorayaki, 1500);
</script>

</body>
</html>
