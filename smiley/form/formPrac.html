<!DOCTYPE html>
<html>
<head>
    <title>Admission Form</title>
</head>
<body>

    <h2>Patient Admission Form</h2>

    <form>

        <label>Patient Name:</label><br>
        <input type="text" name="patientName"><br><br>

        <label>Age:</label><br>
        <input type="number" name="age"><br><br>

        <label>Gender:</label><br>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"><br><br>

        <label>Admission Date:</label><br>
        <input type="date" name="admissionDate"><br><br>

        <label>Doctor Name:</label><br>
        <input type="text" name="doctor"><br><br>

        <label>Reason for Admission:</label><br>
        <textarea name="reason" rows="4" cols="30"></textarea><br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
